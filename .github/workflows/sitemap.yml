name: Regenerate sitemap and pubs index

# Runs nightly and on demand. Reads venues from Supabase, writes
# sitemap.xml AND regenerates the venue list inside pubs/index.html
# (between PUBS-INDEX markers). Commits + pushes if anything changed,
# then pings IndexNow so Bing/Yandex/DuckDuckGo recrawl.
#
# Required repo secrets:
#   PINTPOINT_SUPABASE_URL
#   PINTPOINT_SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC nightly
  workflow_dispatch:        # manual "Run workflow" button

concurrency:
  group: sitemap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate sitemap.xml
        env:
          PINTPOINT_SUPABASE_URL: ${{ secrets.PINTPOINT_SUPABASE_URL }}
          PINTPOINT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PINTPOINT_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-sitemap.mjs

      - name: Regenerate pubs/index.html venue list
        env:
          PINTPOINT_SUPABASE_URL: ${{ secrets.PINTPOINT_SUPABASE_URL }}
          PINTPOINT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PINTPOINT_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-pubs-index.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- sitemap.xml pubs/index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --stat -- sitemap.xml pubs/index.html
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "pintpoint-sitemap-bot"
          git config user.email "noreply@pintpoint.co.uk"
          git add sitemap.xml pubs/index.html
          git commit -m "sitemap + pubs index: nightly regeneration from Supabase"
          git push

      - name: Ping IndexNow (streaming, one URL per request)
        if: steps.diff.outputs.changed == 'true'
        run: ./scripts/indexnow.sh --all
