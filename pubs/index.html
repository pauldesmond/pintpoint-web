<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PINtPOINT Venues</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d1117; --teal: #00D4AA; --text: #fff; --muted: #8b949e; --border: rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .loading { text-align: center; }
    .loading p { color: var(--muted); font-size: 0.9rem; margin-top: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    // Extract slug from URL path: /pubs/radio-city-social → radio-city-social
    var path = window.location.pathname.replace(/\/$/, '');
    var parts = path.split('/');
    var slug = parts[parts.length - 1];
    if (slug && slug !== 'pubs' && slug !== 'index.html') {
      // Redirect to the edge function
      window.location.replace('https://rvokskoevmcekkgiglpa.supabase.co/functions/v1/venue-page?slug=' + encodeURIComponent(slug));
    }
  </script>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading venue&hellip;</p>
  </div>
</body>
</html>
