name = "pintpoint-pubs"
main = "src/index.js"
compatibility_date = "2025-11-01"
account_id = "2c8869d0743b3846dca0b34a462fe16a"

# Route bindings on pintpoint.co.uk:
# - /pubs/*   → dynamic venue pages (proxied to venue-page edge function)
# - /beers/*  → dynamic beer pages (proxied to beer-page edge function)
# - /crawl/*  → dynamic Hall of Fame pages (proxied to crawl-page edge function)
# - /blog/*   → 301 bare slug → .html canonical (kills duplicate URL signal in BWT)
# - /about(/) → 301 redirect to /about-pintpoint.html (canonicalise)
routes = [
  { pattern = "pintpoint.co.uk/pubs/*", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/beers/*", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/crawl/*", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/blog/*", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/about", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/about/", zone_name = "pintpoint.co.uk" },
  { pattern = "pintpoint.co.uk/about/*", zone_name = "pintpoint.co.uk" }
]

[observability]
enabled = true
