<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, initial-scale=1.0" />
  <title>OG card — mild · TT pull-quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    /* Sibling to card-mild-half-to-half-a-percent.html — pull-quote
       layout, no imagery, no third-party wordmarks. Treats Timothy
       Taylor's as a source the way a magazine pull-quote would.
       1200×630, screenshot the .card element via Chrome DevTools
       (cmd-shift-P → Capture node screenshot) for the IG post graphic. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #050a0f; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
    .card {
      width: 1200px;
      height: 630px;
      background: #0d1117;
      color: #fff;
      padding: 56px 80px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    /* Faint accent rule top-and-bottom of the canvas — gives the
       pull-quote room without feeling untethered. */
    .card::before, .card::after {
      content: '';
      position: absolute;
      left: 80px; right: 80px;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .card::before { top: 130px; }
    .card::after { bottom: 130px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; }
    .mast { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .mast span { color: #00D4AA; }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
      color: #00D4AA; border: 1px solid rgba(0,212,170,0.35); padding: 5px 12px; border-radius: 4px;
    }
    .quote-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0;
      position: relative;
    }
    .openquote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 140px;
      color: #FF7A45;
      line-height: 0.5;
      margin-bottom: 4px;
      letter-spacing: -0.04em;
      user-select: none;
    }
    .quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 64px;
      line-height: 1.15;
      letter-spacing: -1px;
      color: #fff;
      max-width: 960px;
    }
    .quote em {
      font-style: italic;
      color: #FF7A45;
      font-weight: 600;
    }
    .attribution {
      margin-top: 32px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      color: #8b949e;
    }
    .attribution__dash {
      width: 24px;
      height: 1px;
      background: #FF7A45;
      margin-right: 0;
      align-self: center;
      flex-shrink: 0;
    }
    .attribution__name {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .attribution__meta {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .footstrip {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: #6b7280; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .footstrip .essay {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      text-transform: none;
      letter-spacing: -0.2px;
      font-size: 16px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="topbar">
      <div class="mast">PINt<span>POINT</span></div>
      <div class="badge">#MildMay</div>
    </div>

    <div class="quote-block">
      <div class="openquote">&ldquo;</div>
      <div class="quote">It's <em>#MildMay</em>, the perfect excuse to rediscover a true classic&hellip; <em>Golden Best.</em></div>

      <div class="attribution">
        <span class="attribution__dash"></span>
        <span class="attribution__name">Timothy Taylor's Brewery</span>
        <span class="attribution__meta">· 11 May 2026</span>
      </div>
    </div>

    <div class="footstrip">
      <span class="essay">From half of British beer to half a percent — what happened to mild.</span>
      <span>pintpoint.co.uk / blog</span>
    </div>

  </div>
</body>
</html>
