<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Starting your PINtPOINT download…</title>
  <meta http-equiv="refresh" content="1; url=https://expo.dev/artifacts/eas/pHn4XiYGxT3ZJbEw8QxrAG.apk">
  <style>
    :root { --bg: #0d1117; --teal: #00D4AA; --text: #fff; --muted: #8b949e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 24px; }
    .logo span { color: var(--teal); }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 16px; max-width: 440px; }
    .spinner {
      display: inline-block; width: 20px; height: 20px; border: 2px solid var(--muted);
      border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: var(--teal); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="logo">PINt<span>POINT</span></div>
    <h1><span class="spinner"></span>Starting your download…</h1>
    <p>PINtPOINT.apk should begin downloading automatically in a second.</p>
    <p>If it doesn't, <a id="fallback" href="https://expo.dev/artifacts/eas/pHn4XiYGxT3ZJbEw8QxrAG.apk">tap here to download manually</a>.</p>
  </main>
  <script>
    (function () {
      var target = 'https://expo.dev/artifacts/eas/pHn4XiYGxT3ZJbEw8QxrAG.apk';
      // Fire-and-forget beacon to log the click. sendBeacon is designed to
      // survive page unload, so the redirect below won't interrupt it.
      try {
        var payload = JSON.stringify({
          referrer: document.referrer || null,
          ua: navigator.userAgent || null
        });
        // text/plain keeps the beacon a CORS "simple request" so the browser
        // doesn't need a preflight (which sendBeacon can't perform — the
        // request would otherwise be silently dropped). Server parses the
        // text as JSON regardless.
        var blob = new Blob([payload], { type: 'text/plain' });
        navigator.sendBeacon(
          'https://rvokskoevmcekkgiglpa.supabase.co/functions/v1/log-apk-download',
          blob
        );
      } catch (e) { /* silent */ }
      // Redirect fast — meta refresh is a fallback, this is the primary path.
      setTimeout(function () { window.location.replace(target); }, 400);
    })();
  </script>
</body>
</html>
